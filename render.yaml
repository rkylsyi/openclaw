services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "18789"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: OPENCLAW_CONFIG_PATH
        value: /etc/secrets/openclaw.json
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 2
